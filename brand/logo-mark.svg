<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" aria-label="APEX Revenue Operations mark">
  <defs>
    <linearGradient id="apexGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3FA0FF" />
      <stop offset="55%" stop-color="#1E5FD8" />
      <stop offset="100%" stop-color="#0A1E3F" />
    </linearGradient>
    <linearGradient id="apexEdge" x1="0" y1="1" x2="1" y2="0">
      <stop offset="0%" stop-color="#3FA0FF" />
      <stop offset="100%" stop-color="#FFFFFF" stop-opacity="0.85" />
    </linearGradient>
  </defs>
  <!-- back peak (deep) -->
  <path d="M32 6 L58 56 L40 56 Z" fill="url(#apexGrad)" />
  <!-- front peak (light edge) -->
